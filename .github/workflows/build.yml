name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev m4 libtool-bin help2man expect
          pip install --user --upgrade buildozer Cython virtualenv

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          
          # Очищення старих спроб
          rm -rf .buildozer/
          
          # Використовуємо 'yes' прямо перед командою buildozer
          # Це найнадійніший спосіб закидати програму підтвердженнями
          yes y | buildozer android debug
